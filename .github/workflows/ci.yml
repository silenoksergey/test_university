name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB_AUTH: auth_db
      POSTGRES_DB_UNIVERSITY: university_db
      AUTH_SERVICE_INTERNAL_URL: http://auth:8000
      AUTH_SERVICE_API_URL: http://localhost:8000
      UNIVERSITY_SERVICE_INTERNAL_URL: http://university:8000
      UNIVERSITY_SERVICE_API_URL: http://localhost:8001

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff lint
        run: ruff check .

      - name: Start SUT (docker compose)
        shell: bash
        run: |
          set -euo pipefail
          docker compose up -d
          echo "Waiting for services to be ready..."
          ready=0
          for i in {1..120}; do
            ok1=1; ok2=1
            curl -fsS http://localhost:8000/docs >/dev/null 2>&1 && ok1=0 || true
            curl -fsS http://localhost:8001/docs >/dev/null 2>&1 && ok2=0 || true
            if [ "$ok1" -eq 0 ] && [ "$ok2" -eq 0 ]; then
              echo "Services are ready"
              ready=1
              break
            fi
            sleep 2
          done
          docker compose ps
          if [ "$ready" -ne 1 ]; then
            echo "Services are NOT ready"
            docker compose logs --no-color | tail -n 400 || true
            exit 1
          fi

      - name: Prepare Allure dir
        run: mkdir -p allure-results

      - name: Run tests in Docker (host network)
        run: |
          docker run --rm --network host -v "$PWD":/app -w /app python:3.12-slim bash -lc "
            python -m pip install --upgrade pip &&
            pip install -r requirements.txt allure-pytest &&
            pytest -q --alluredir=allure-results --junitxml=pytest-junit.xml
          "
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: ignore

      - name: Setup Java (for Allure CLI)
        if: ${{ hashFiles('allure-results/**') != '' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Allure CLI
        if: ${{ hashFiles('allure-results/**') != '' }}
        run: npm i -g allure-commandline@2.25.0

      - name: Generate Allure HTML
        if: ${{ hashFiles('allure-results/**') != '' }}
        run: allure generate allure-results -o allure-report --clean

      - name: Upload Pages artifact
        if: ${{ hashFiles('allure-report/**') != '' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  deploy:
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
