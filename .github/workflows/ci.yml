name: CI

on:
  pull_request:

permissions:
  contents: write

env:
  POSTGRES_USER: ${{ vars.POSTGRES_USER || 'postgres' }}
  POSTGRES_DB_AUTH: ${{ vars.POSTGRES_DB_AUTH || 'auth_db' }}
  POSTGRES_DB_UNIVERSITY: ${{ vars.POSTGRES_DB_UNIVERSITY || 'university_db' }}
  AUTH_SERVICE_INTERNAL_URL: ${{ vars.AUTH_SERVICE_INTERNAL_URL || 'http://auth:8000' }}
  AUTH_SERVICE_API_URL: ${{ vars.AUTH_SERVICE_API_URL || 'http://localhost:8000' }}
  UNIVERSITY_SERVICE_INTERNAL_URL: ${{ vars.UNIVERSITY_SERVICE_INTERNAL_URL || 'http://university:8000' }}
  UNIVERSITY_SERVICE_API_URL: ${{ vars.UNIVERSITY_SERVICE_API_URL || 'http://localhost:8001' }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api_changed: ${{ steps.filter.outputs.api }}
      tests_changed: ${{ steps.filter.outputs.tests }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Paths filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'services/**'
              - 'utils/**'
              - 'logger/**'
              - 'docker-compose.yml'
              - 'requirements.txt'
              - 'main.py'
            tests:
              - 'tests/**'

  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.api_changed == 'true' || needs.changes.outputs.tests_changed == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff check
        run: ruff check .

  build_runner:
    name: Build test runner image
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.api_changed == 'true' || needs.changes.outputs.tests_changed == 'true' }}
    permissions:
      contents: read
      packages: write
    outputs:
      image: ghcr.io/${{ github.repository }}/test-runner:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Dockerfile for test runner
        shell: bash
        run: |
          cat > Dockerfile.test-runner <<'EOF'
          FROM python:3.12-slim
          ENV PIP_NO_CACHE_DIR=1 PYTHONDONTWRITEBYTECODE=1 PYTHONUNBUFFERED=1
          RUN apt-get update && apt-get install -y --no-install-recommends curl git && rm -rf /var/lib/apt/lists/*
          WORKDIR /app
          COPY requirements.txt /tmp/requirements.txt
          RUN python -m pip install --upgrade pip && \
              pip install -r /tmp/requirements.txt allure-pytest
          ENTRYPOINT ["/bin/bash","-lc"]
          EOF

      - name: Build and push runner
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.test-runner
          push: true
          tags: ${{ needs.build_runner.outputs.image || format('ghcr.io/{0}/test-runner:{1}', github.repository, github.sha) }}

  tests:
    name: Pytest in Docker
    runs-on: ubuntu-latest
    needs: [lint, changes, build_runner]
    if: ${{ needs.lint.result == 'success' && (needs.changes.outputs.api_changed == 'true' || needs.changes.outputs.tests_changed == 'true') }}
    permissions:
      packages: read
    env:
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      RUNNER_IMAGE: ${{ needs.build_runner.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start SUT (docker compose)
        shell: bash
        run: |
          set -euo pipefail
          docker compose up -d
          docker compose ps

      - name: Prepare Allure dir
        run: mkdir -p allure-results

      - name: Run tests with runner image (host network)
        run: |
          docker pull "$RUNNER_IMAGE"
          docker run --rm --network host -v "$PWD":/app -w /app "$RUNNER_IMAGE" "
            pytest -q --alluredir=allure-results --junitxml=pytest-junit.xml
          "

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: ignore

      - name: Setup Java (for Allure CLI)
        if: ${{ hashFiles('allure-results/**') != '' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Allure CLI
        if: ${{ always() && hashFiles('allure-results/**') != '' }}
        run: npm i -g allure-commandline@2.25.0

      - name: Generate Allure HTML
        if: ${{ always() && hashFiles('allure-results/**') != '' }}
        run: allure generate allure-results -o allure-report --clean

      - name: Upload Pages artifact
        if: ${{ always() && hashFiles('allure-results/**') != '' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  notify_on_fail:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: tests
    if: ${{ always() && needs.tests.result == 'failure' }}
    steps:
      - run: echo "::error ::Tests failed — notify here"

  deploy:
    name: Publish Allure to GitHub Pages
    needs: tests
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4